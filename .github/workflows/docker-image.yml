name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch: {}

env:
  IMAGE: znggeneric.azurecr.io/llmhub
  RELEASE: agb
  NAMESPACE: llmhub
  CHART: deploy/helm/agenticbear
  VALUES: deploy/helm/values-agb.yaml

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: tag
        run: echo "tag=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: znggeneric.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade
        run: |
          helm upgrade --install "$RELEASE" "$CHART" \
            --namespace "$NAMESPACE" --create-namespace \
            -f "$VALUES" \
            --set-string image.repository="$IMAGE" \
            --set-string image.tag="${{ steps.tag.outputs.tag }}" \
            --set 'imagePullSecrets[0].name=acr-pull' \
            --wait --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deploy/${RELEASE}-agenticbear-server -n "$NAMESPACE" --timeout=180s
          kubectl get pods -n "$NAMESPACE"
