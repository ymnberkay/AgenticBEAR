# Build → push → deploy.
#
# Pushes the image to ACR tagged with the root package.json version (1.0.0, 1.0.1, …),
# then helm-upgrades the `agb` release using deploy/helm/values-agb.yaml as the
# single source of overrides (per that file's own rule: always -f, never bare --set,
# so hub/ingress/SSRF settings survive every upgrade).
#
# Version = the release: bump it before merging (`npm version patch --no-git-tag-version`),
# otherwise the same tag is overwritten in ACR and running pods won't pull the change.
#
# Required repository secrets:
#   ACR_USERNAME / ACR_PASSWORD  — ACR admin user or a service principal with acrPush
#   KUBE_CONFIG                  — base64-encoded kubeconfig for the target cluster
#                                  (e.g. `az aks get-credentials … && cat ~/.kube/config | base64`)
#
# The cluster must have an image pull secret named `acr-pull` in the release
# namespace:
#   kubectl create secret docker-registry acr-pull -n llmhub \
#     --docker-server=znggeneric.azurecr.io --docker-username=… --docker-password=…

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch: {}

env:
  IMAGE: znggeneric.azurecr.io/llmhub
  RELEASE: agb
  NAMESPACE: llmhub
  CHART: deploy/helm/agenticbear
  VALUES: deploy/helm/values-agb.yaml

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: tag
        run: echo "tag=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: znggeneric.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade
        run: |
          helm upgrade --install "$RELEASE" "$CHART" \
            --namespace "$NAMESPACE" --create-namespace \
            -f "$VALUES" \
            --set-string image.repository="$IMAGE" \
            --set-string image.tag="${{ steps.tag.outputs.tag }}" \
            --set 'imagePullSecrets[0].name=acr-pull' \
            --wait --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deploy/${RELEASE}-agenticbear-server -n "$NAMESPACE" --timeout=180s
          kubectl get pods -n "$NAMESPACE"
