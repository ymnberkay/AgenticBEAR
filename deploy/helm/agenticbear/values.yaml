# Default values for AgenticBEAR.
# A single `helm install` brings up the app + Postgres + Qdrant, ready to use.

# -- Override the generated resource name prefix.
nameOverride: ""
fullnameOverride: ""

image:
  # IMPORTANT: build & push this image first (see chart NOTES / repo Dockerfile),
  # then set repository/tag here. e.g. `docker build -t <repo>/agenticbear:0.1.0 . && docker push ...`
  repository: agenticbear
  tag: ""              # defaults to .Chart.appVersion when empty
  pullPolicy: IfNotPresent
imagePullSecrets: []

# ── Application server (API + OpenAI-compatible gateway + static UI, one port) ──
server:
  replicaCount: 1               # keep at 1 — RWO PVC + git-workspace state is single-writer
  port: 3001
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits:   { cpu: "2",  memory: 2Gi }
  # /data is emptyDir — port file + short-lived scratch. **Nothing important** lives there.
  # /workspace is the PVC that persists:
  #   - git-workspace clones (per-project, redirected via AGB_WORKSPACES_ROOT env)
  #   - files agents write during runs
  workspace:
    persist: true
    size: 10Gi
    storageClass: ""          # "" = cluster default
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Raw env vars merged into the server container — override anything below without templating.
  extraEnv: {}
  #  COST_SEMANTIC_THRESHOLD: "0.92"
  #  AGENT_SHELL: "off"

# ── Chat attachment upload limits (image / audio / video) ──
# Surfaced to the client via GET /api/config, so raising a limit here takes effect after a
# `helm upgrade` — no client rebuild. NOTE: base64 inflates a file ~1.34x, so keep
# `maxVideoMb * 1.34 < bodyLimitMb`; raise bodyLimitMb alongside larger video caps.
uploads:
  bodyLimitMb: 64        # hard cap on the whole request body (all attachments + text)
  maxImageMb: 20
  maxAudioMb: 25
  maxVideoMb: 40
  maxImages: 4
  maxAudioClips: 2
  maxVideos: 1

# ── Auth / bootstrap (the first admin is seeded on first boot) ──
auth:
  adminUsername: admin
  adminPassword: admin           # CHANGE ME for anything real
  tokenTtlHours: 168
  # HMAC secret for session tokens. Leave empty to auto-generate a random one on install
  # (persisted in the chart's Secret; rotating it logs everyone out).
  secret: ""

  # ── Login methods — enable any combination; each deployment picks its own mix ──
  # (enterprise on-prem pattern: local passwords, Entra ID, any OIDC IdP, GitHub, TOTP 2FA)
  local:
    enabled: true                # false → SSO-only sign-in (needs ≥1 provider below)
    # Admins may still password-login while local auth is disabled, so a broken IdP can't
    # lock the operator out. Set false for strict SSO-only.
    adminBreakGlass: true

  # Minimum length for local passwords (create / admin reset / self change).
  # Admin-set passwords are provisional: the user must pick their own at first login.
  passwordMinLength: 8

  # Require newly-added users to confirm their email before they can sign in. Needs SMTP
  # configured (below) and the user to have an email; otherwise ignored (users created active).
  requireEmailVerification: false

  # TOTP two-factor for password logins: "off" | "optional" | "required".
  #   optional → users enroll themselves (user menu → Two-factor auth)
  #   required → enrollment is forced at next password login
  # SSO sign-ins delegate MFA to the IdP (enforce it there — e.g. Entra Conditional Access).
  mfa:
    mode: "off"

  sso:
    # External base URL for OAuth redirect URIs, e.g. https://agb.example.com.
    # REQUIRED in production once any provider is enabled (redirect URIs must not be
    # derived from request headers). Dev-only fallback: X-Forwarded-Proto/Host.
    publicUrl: ""
    autoProvision: true          # create users on first SSO login (JIT)
    autoLink: true               # attach an SSO identity to an existing matching username/email
    defaultRole: contributor     # role for JIT-provisioned users: admin | contributor | viewer

    # Bring your own Secret for the client secrets below (ExternalSecrets / Vault). When set,
    # the chart Secret omits them and the Deployment adds an envFrom secretRef to this name.
    # Expected keys: AUTH_ENTRA_CLIENT_SECRET / AUTH_OIDC_CLIENT_SECRET / AUTH_GITHUB_CLIENT_SECRET.
    existingSecret: ""

    # ── IdP group → permission-group sync ──
    # Claim that carries group memberships in the id_token/userinfo (Entra: add the "groups"
    # optional claim under App registration → Token configuration).
    groupsClaim: "groups"
    # IdP group/team → AgenticBEAR permission-group NAME. When non-empty, a user's permission
    # groups are REPLACED from this mapping at every SSO login (the IdP is the source of
    # truth; manual assignments to SSO users won't stick). GitHub keys are "org/team-slug".
    groupMapping: {}
    #  "f2a3b1c4-…-entra-object-id": "Engineering"
    #  "platform-admins": "Admins"
    #  "acme-inc/platform-team": "Platform"

    # Microsoft Entra ID (Azure AD). App registration redirect URI:
    #   <publicUrl>/api/auth/sso/entra/callback
    entra:
      enabled: false
      tenantId: ""
      clientId: ""
      clientSecret: ""           # goes into the chart Secret, not the ConfigMap

    # Any OIDC-compliant IdP (Okta, Keycloak, Auth0, …). Redirect URI:
    #   <publicUrl>/api/auth/sso/oidc/callback
    oidc:
      enabled: false
      displayName: "SSO"         # login-button label, e.g. "Okta"
      issuer: ""                 # e.g. https://login.example.com/realms/main (discovery under /.well-known)
      clientId: ""
      clientSecret: ""
      scopes: "openid profile email"

    # GitHub OAuth app (or GitHub Enterprise Server via baseUrl). Callback URL:
    #   <publicUrl>/api/auth/sso/github/callback
    github:
      enabled: false
      clientId: ""
      clientSecret: ""
      org: ""                    # restrict sign-in to active members of this org ("" = anyone)
      baseUrl: ""                # GHE server base, e.g. https://github.corp.example ("" = github.com)

# ── Outbound email (SMTP) — used for account-verification links ──
# Enabled when host + (from or user) are set. Password goes into the chart Secret.
smtp:
  host: ""              # e.g. smtp.sendgrid.net
  port: 587
  secure: false         # true → implicit TLS (usually port 465); false → STARTTLS
  user: ""              # SMTP username (optional for open relays)
  password: ""          # SMTP password → Secret; or use --set
  from: ""              # From address, e.g. "AgenticBEAR <no-reply@acme.dev>"

# ── LLM provider keys (optional — can also be set later in the UI → Settings).
# Any left empty are simply not injected.
providerKeys:
  anthropic: ""        # ANTHROPIC_API_KEY
  openai: ""           # OPENAI_API_KEY
  gemini: ""           # GEMINI_API_KEY
  voyage: ""           # VOYAGE_API_KEY (embeddings for L1 cache)

# ── Cost middleware knobs. Individual layers toggle here without editing the
#    ConfigMap by hand. Set to empty string to inherit server defaults. ──
cost:
  layers:
    compression: "true"     # L0 — deterministic context compression
    semanticCache: "true"   # L1 — needs Qdrant (bundled or external)
    router: "true"          # L2 — cheap-model routing
    promptCache: "true"     # L3 — provider prompt cache credit
    outputMin: "true"       # L4 — "be brief" system directive
  # L1 tuning
  embeddingProvider: "gemini"          # gemini | voyage | openai | local
  semanticThreshold: "0.95"
  semanticTtlSeconds: "86400"
  # L2 router — cheap classifier model
  routerCheapModel: "claude-haiku-4-5-20251001"
  # L3 provider prompt cache TTL (Anthropic accepts 5m/1h)
  promptCacheTtl: "5m"

# ── Data-loss prevention (secret + PII scan on egress) ──
dlp:
  enabled: "true"           # true → scan & redact; false → bypass entirely
  secrets: "true"
  pii: "true"
  block: "false"            # true → return 422 instead of redacting

# ── SSRF egress guard ──
security:
  # External-agent endpoints normally must resolve to PUBLIC addresses. Hostnames listed
  # here may resolve to private/cluster IPs — use it for trusted in-cluster agent services.
  # Exact hostnames or `*.suffix` wildcards; literal IPs are never accepted.
  #   ssrfAllowedHosts:
  #     - pii-agent.default.svc.cluster.local
  #     - "*.agents.svc.cluster.local"
  ssrfAllowedHosts: []

# ── Inbound issue-tracker pull scheduler (SonarQube / Azure Boards / etc.) ──
issuePull:
  # Milliseconds between polls. 0 disables the scheduler entirely.
  intervalMs: "300000"

# ── Agent runtime toggles ──
agent:
  # "off" → agents lose the `run_command` tool (can't spawn shells). Default on.
  shell: "on"

# ── Bundled Postgres ──
postgres:
  enabled: true                # false → use external DB via `externalDatabase.url`
  image: postgres:16-alpine
  database: agenticbear
  username: agb
  password: agb                # CHANGE ME
  port: 5432
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "1",  memory: 1Gi }
  persistence:
    size: 10Gi
    storageClass: ""

# When postgres.enabled=false, point the app at an existing database.
externalDatabase:
  url: ""                      # postgres://user:pass@host:5432/db

# ── Bundled Qdrant (L1 semantic-cache vector store) ──
qdrant:
  enabled: true                # false → use external Qdrant via qdrant.externalUrl
  image: qdrant/qdrant:v1.12.4
  httpPort: 6333
  collection: agenticbear_llm_cache
  externalUrl: ""              # used only when enabled=false (e.g. http://qdrant:6333)
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "1",  memory: 2Gi }
  persistence:
    size: 10Gi
    storageClass: ""

# ── Networking ──
service:
  type: ClusterIP
  port: 80                     # external port → server.port

ingress:
  enabled: false
  className: ""
  # SSE-safe defaults — chat streaming and gateway `/v1/chat/completions` streams
  # need proxy-buffering off, or responses hang for 10-30 seconds. Merge with
  # your own annotations rather than replacing them wholesale.
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"   # room for external-agent image uploads
  host: agenticbear.local
  tls: []                      # [{ secretName: agb-tls, hosts: [agenticbear.local] }]

# ── Hub topology: control-plane pod + one session pod per logged-in user ──
# false → today's standalone single pod. true → the server Deployment becomes the hub
# (AGB_MODE=hub): it serves auth/SPA/gateway/MCP and creates a Pod + Service + path-based
# Ingress (/u/<hash>) per user via the Kubernetes API (RBAC in hub-rbac.yaml). Keep
# server.replicaCount=1 — the session registry and idle reaper live in hub memory.
hub:
  enabled: false

# Session-pod knobs (used only when hub.enabled=true).
session:
  image: ""                    # "" = the chart image (same build, AGB_MODE=session)
  port: 3001
  ttlSeconds: 1800             # idle TTL before the reaper deletes the pod (never mid-run)
  readyTimeoutSeconds: 120
  basePrefix: /u               # public path prefix: <basePrefix>/<user-hash>/...
  # Session workspaces (/workspace — git clones + agent file writes) are emptyDir by default:
  # simplest, but uncommitted work dies with the pod. Point them at a shared NFS export instead
  # and every user gets a private, reap-surviving directory <path>/<username>/ (mounted with
  # subPath=<username>, volume named workspace-<username> for easy tracking).
  workspace:
    nfs:
      enabled: false
      server: ""               # e.g. nfs.example.internal
      path: ""                 # exported base path, e.g. /exports/agenticbear
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "1",  memory: 2Gi }
  networkPolicy:
    enabled: false             # true → session pods accept traffic only from ingress + hub

# Pod-level security context (volumes are chowned to this group).
podSecurityContext:
  fsGroup: 1000
