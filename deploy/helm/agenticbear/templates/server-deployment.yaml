{{- /* Hub mode: agents run in per-user session pods (emptyDir workspaces), so the hub itself needs no workspace PVC. */}}
{{- if and .Values.server.workspace.persist (gt (int .Values.server.replicaCount) 0) (not .Values.hub.enabled) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "agenticbear.serverName" . }}-workspace
  labels:
    {{- include "agenticbear.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.server.workspace.size }}
  {{- if .Values.server.workspace.storageClass }}
  storageClassName: {{ .Values.server.workspace.storageClass | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenticbear.serverName" . }}
  labels:
    {{- include "agenticbear.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  # RWO PVC on `workspace` means two pods can't coexist — Recreate stops the old
  # pod before starting the new one. Fine because the app is single-writer anyway
  # (SQLite fallback + git-workspace mirrors are per-pod local state).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "agenticbear.selectorLabels" (dict "ctx" . "component" "server") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "agenticbear.selectorLabels" (dict "ctx" . "component" "server") | nindent 8 }}
      annotations:
        # Roll pods when config/secret change.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.server.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.hub.enabled }}
      serviceAccountName: {{ include "agenticbear.fullname" . }}-hub
      {{- end }}
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Postgres at {{ include "agenticbear.postgresName" . }}:{{ .Values.postgres.port }} ..."
              until nc -z {{ include "agenticbear.postgresName" . }} {{ .Values.postgres.port }}; do sleep 2; done
              echo "Postgres is up."
      {{- end }}
      containers:
        - name: server
          image: {{ include "agenticbear.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
          envFrom:
            - configMapRef:
                name: {{ include "agenticbear.configName" . }}
            - secretRef:
                name: {{ include "agenticbear.secretName" . }}
          # Redirect the git-workspace clone root at the persistent volume so
          # `git clone` output survives pod restarts. Without this, `HOME=/data`
          # + emptyDir `/data` would wipe every cloned repo when the pod cycles.
          env:
            - name: AGB_WORKSPACES_ROOT
              value: "/workspace"
            {{- if .Values.hub.enabled }}
            - name: AGB_MODE
              value: "hub"
            - name: AGB_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: AGB_SESSION_IMAGE
              value: {{ default (include "agenticbear.image" .) .Values.session.image | quote }}
            - name: AGB_SESSION_PORT
              value: {{ .Values.session.port | quote }}
            - name: AGB_SESSION_TTL_SECONDS
              value: {{ .Values.session.ttlSeconds | quote }}
            - name: AGB_SESSION_READY_TIMEOUT_SECONDS
              value: {{ .Values.session.readyTimeoutSeconds | quote }}
            - name: AGB_SESSION_BASE_PREFIX
              value: {{ .Values.session.basePrefix | quote }}
            - name: AGB_SESSION_CPU_REQUEST
              value: {{ .Values.session.resources.requests.cpu | quote }}
            - name: AGB_SESSION_CPU_LIMIT
              value: {{ .Values.session.resources.limits.cpu | quote }}
            - name: AGB_SESSION_MEM_REQUEST
              value: {{ .Values.session.resources.requests.memory | quote }}
            - name: AGB_SESSION_MEM_LIMIT
              value: {{ .Values.session.resources.limits.memory | quote }}
            # Session pods inherit the hub's ConfigMap/Secret via envFrom — the hub never
            # copies secret values through its own memory into pod specs.
            - name: AGB_SESSION_CONFIGMAP
              value: {{ include "agenticbear.configName" . }}
            - name: AGB_SESSION_SECRET
              value: {{ include "agenticbear.secretName" . }}
            - name: AGB_INGRESS_CLASS
              value: {{ .Values.ingress.className | default "nginx" | quote }}
            - name: AGB_PUBLIC_HOST
              value: {{ .Values.ingress.host | quote }}
            {{- if .Values.session.workspace.nfs.enabled }}
            - name: AGB_SESSION_NFS_SERVER
              value: {{ required "session.workspace.nfs.server is required when nfs.enabled" .Values.session.workspace.nfs.server | quote }}
            - name: AGB_SESSION_NFS_PATH
              value: {{ required "session.workspace.nfs.path is required when nfs.enabled" .Values.session.workspace.nfs.path | quote }}
            {{- end }}
            {{- end }}
          # startupProbe covers the "first-boot migration takes a while" case
          # (28+ migrations run against a cold DB, plus Postgres wait-for) without
          # accidentally killing the pod via liveness/readiness during that window.
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 60   # ~3 min of migrate time
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: data
          emptyDir: {}
        - name: workspace
          {{- if and .Values.server.workspace.persist (not .Values.hub.enabled) }}
          persistentVolumeClaim:
            claimName: {{ include "agenticbear.serverName" . }}-workspace
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.server.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.server.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
