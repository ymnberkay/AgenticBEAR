{{- if .Values.hub.enabled }}
# Hub-mode RBAC: the hub creates one Pod + Service + Ingress per logged-in user and the idle
# reaper deletes Pods again. Namespace-scoped — the hub never touches other namespaces.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agenticbear.fullname" . }}-hub
  labels:
    {{- include "agenticbear.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agenticbear.fullname" . }}-hub
  labels:
    {{- include "agenticbear.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "get", "list", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agenticbear.fullname" . }}-hub
  labels:
    {{- include "agenticbear.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agenticbear.fullname" . }}-hub
subjects:
  - kind: ServiceAccount
    name: {{ include "agenticbear.fullname" . }}-hub
    namespace: {{ .Release.Namespace }}
{{- end }}
