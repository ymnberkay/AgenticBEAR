apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agenticbear.configName" . }}
  labels:
    {{- include "agenticbear.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  PORT: {{ .Values.server.port | quote }}
  # Postgres when bundled or externalDatabase.url set; otherwise fallback SQLite.
  {{- if or .Values.postgres.enabled .Values.externalDatabase.url }}
  DB_DRIVER: "postgres"
  {{- else }}
  DB_DRIVER: "sqlite"
  {{- end }}
  HOME: "/data"
  DB_PATH: "/data/.subagent-manager/data.db"
  AUTH_ADMIN_USERNAME: {{ .Values.auth.adminUsername | quote }}
  AUTH_TOKEN_TTL_HOURS: {{ .Values.auth.tokenTtlHours | quote }}

  # ── Login methods (client secrets live in the Secret) ──
  {{- with .Values.auth.local }}
  AUTH_LOCAL_ENABLED: {{ .enabled | quote }}
  AUTH_LOCAL_ADMIN_BREAK_GLASS: {{ .adminBreakGlass | quote }}
  {{- end }}
  {{- with .Values.auth.mfa }}
  AUTH_MFA_MODE: {{ .mode | quote }}
  {{- end }}
  AUTH_PASSWORD_MIN_LENGTH: {{ .Values.auth.passwordMinLength | quote }}
  AUTH_REQUIRE_EMAIL_VERIFICATION: {{ .Values.auth.requireEmailVerification | quote }}
  {{- with .Values.smtp }}
  {{- if .host }}
  SMTP_HOST: {{ .host | quote }}
  SMTP_PORT: {{ .port | quote }}
  SMTP_SECURE: {{ .secure | quote }}
  {{- if .user }}
  SMTP_USER: {{ .user | quote }}
  {{- end }}
  {{- if .from }}
  SMTP_FROM: {{ .from | quote }}
  {{- end }}
  {{- end }}
  {{- end }}
  {{- with .Values.auth.sso }}
  {{- if .publicUrl }}
  AUTH_PUBLIC_URL: {{ .publicUrl | quote }}
  {{- end }}
  AUTH_SSO_AUTO_PROVISION: {{ .autoProvision | quote }}
  AUTH_SSO_AUTO_LINK: {{ .autoLink | quote }}
  AUTH_SSO_DEFAULT_ROLE: {{ .defaultRole | quote }}
  AUTH_SSO_GROUPS_CLAIM: {{ .groupsClaim | quote }}
  {{- if .groupMapping }}
  AUTH_SSO_GROUP_MAPPING: {{ .groupMapping | toJson | quote }}
  {{- end }}
  {{- if .entra.enabled }}
  AUTH_ENTRA_ENABLED: "true"
  AUTH_ENTRA_TENANT_ID: {{ .entra.tenantId | quote }}
  AUTH_ENTRA_CLIENT_ID: {{ .entra.clientId | quote }}
  {{- end }}
  {{- if .oidc.enabled }}
  AUTH_OIDC_ENABLED: "true"
  AUTH_OIDC_DISPLAY_NAME: {{ .oidc.displayName | quote }}
  AUTH_OIDC_ISSUER: {{ .oidc.issuer | quote }}
  AUTH_OIDC_CLIENT_ID: {{ .oidc.clientId | quote }}
  AUTH_OIDC_SCOPES: {{ .oidc.scopes | quote }}
  {{- end }}
  {{- if .github.enabled }}
  AUTH_GITHUB_ENABLED: "true"
  AUTH_GITHUB_CLIENT_ID: {{ .github.clientId | quote }}
  {{- if .github.org }}
  AUTH_GITHUB_ORG: {{ .github.org | quote }}
  {{- end }}
  {{- if .github.baseUrl }}
  AUTH_GITHUB_BASE_URL: {{ .github.baseUrl | quote }}
  {{- end }}
  {{- end }}
  {{- end }}

  # ── Cost middleware ──
  COST_LAYER_COMPRESSION:    {{ .Values.cost.layers.compression    | quote }}
  COST_LAYER_SEMANTIC_CACHE: {{ .Values.cost.layers.semanticCache  | quote }}
  COST_LAYER_ROUTER:         {{ .Values.cost.layers.router         | quote }}
  COST_LAYER_PROMPT_CACHE:   {{ .Values.cost.layers.promptCache    | quote }}
  COST_LAYER_OUTPUT_MIN:     {{ .Values.cost.layers.outputMin      | quote }}
  COST_EMBEDDING_PROVIDER:   {{ .Values.cost.embeddingProvider     | quote }}
  COST_SEMANTIC_THRESHOLD:   {{ .Values.cost.semanticThreshold     | quote }}
  COST_SEMANTIC_TTL_SECONDS: {{ .Values.cost.semanticTtlSeconds    | quote }}
  COST_ROUTER_CHEAP_MODEL:   {{ .Values.cost.routerCheapModel      | quote }}
  COST_PROMPT_CACHE_TTL:     {{ .Values.cost.promptCacheTtl        | quote }}
  COST_QDRANT_URL:           {{ include "agenticbear.qdrantUrl" .  | quote }}
  COST_QDRANT_COLLECTION:    {{ .Values.qdrant.collection          | quote }}

  # ── DLP ──
  DLP_ENABLED: {{ .Values.dlp.enabled | quote }}
  DLP_SECRETS: {{ .Values.dlp.secrets | quote }}
  DLP_PII:     {{ .Values.dlp.pii     | quote }}
  DLP_BLOCK:   {{ .Values.dlp.block   | quote }}

  # ── SSRF guard — in-cluster hosts external agents may call (reaches session pods too) ──
  {{- with (.Values.security).ssrfAllowedHosts }}
  SSRF_ALLOWED_HOSTS: {{ join "," . | quote }}
  {{- end }}

  # ── Issue-tracker inbound pull ──
  ISSUE_PULL_INTERVAL_MS: {{ .Values.issuePull.intervalMs | quote }}

  # ── Chat attachment upload limits (client reads these via /api/config) ──
  {{- with .Values.uploads }}
  BODY_LIMIT_MB:   {{ .bodyLimitMb   | quote }}
  MAX_IMAGE_MB:    {{ .maxImageMb    | quote }}
  MAX_AUDIO_MB:    {{ .maxAudioMb    | quote }}
  MAX_VIDEO_MB:    {{ .maxVideoMb    | quote }}
  MAX_IMAGES:      {{ .maxImages     | quote }}
  MAX_AUDIO_CLIPS: {{ .maxAudioClips | quote }}
  MAX_VIDEOS:      {{ .maxVideos     | quote }}
  {{- end }}

  # ── Agent runtime ──
  AGENT_SHELL: {{ .Values.agent.shell | quote }}
  {{- range $k, $v := .Values.server.extraEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
