apiVersion: v1
kind: Service
metadata:
  name: {{ include "agenticbear.serverName" . }}
  labels:
    {{- include "agenticbear.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "agenticbear.selectorLabels" (dict "ctx" . "component" "server") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
