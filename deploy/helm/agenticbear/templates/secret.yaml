{{- /* Preserve a generated AUTH_SECRET across upgrades by reading the existing one. */ -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace (include "agenticbear.secretName" .)) -}}
{{- $authSecret := .Values.auth.secret -}}
{{- if not $authSecret -}}
  {{- if and $existing $existing.data (index $existing.data "AUTH_SECRET") -}}
    {{- $authSecret = (index $existing.data "AUTH_SECRET" | b64dec) -}}
  {{- else -}}
    {{- $authSecret = randAlphaNum 48 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agenticbear.secretName" . }}
  labels:
    {{- include "agenticbear.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_SECRET: {{ $authSecret | quote }}
  AUTH_ADMIN_PASSWORD: {{ .Values.auth.adminPassword | quote }}
  DATABASE_URL: {{ include "agenticbear.databaseUrl" . | quote }}
  {{- if .Values.postgres.enabled }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  {{- end }}
  {{- with .Values.providerKeys.anthropic }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.providerKeys.openai }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.providerKeys.gemini }}
  GEMINI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.providerKeys.voyage }}
  VOYAGE_API_KEY: {{ . | quote }}
  {{- end }}
