# TEMPLATE — copy to `secret.yaml` (git-ignored), fill in real values, apply.
#
#   $ cp k8s/secret.example.yaml k8s/secret.yaml
#   $ ${EDITOR:-vim} k8s/secret.yaml
#   $ kubectl apply -f k8s/secret.yaml
#
# Better: use sealed-secrets, external-secrets, or the k8s vault operator —
# never commit unencrypted secret material to a public repo.
apiVersion: v1
kind: Secret
metadata:
  name: agenticbear-secrets
  namespace: agenticbear
type: Opaque
stringData:
  # HMAC key for session tokens — the server reads AUTH_SECRET. 32+ random bytes.
  # Generate: node -e "console.log(require('crypto').randomBytes(48).toString('base64'))"
  AUTH_SECRET: "replace-me-with-real-random-bytes"

  # Postgres. Point at your managed DB, or at the bundled StatefulSet
  # from postgres.yaml (postgres.agenticbear.svc.cluster.local).
  DATABASE_URL: "postgres://agenticbear:changeme@postgres.agenticbear.svc.cluster.local:5432/agenticbear"

  # Optional provider fallbacks — normally these are set in Settings → Providers,
  # which stores them encrypted in the DB. These env fallbacks only kick in if
  # the DB row is empty.
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
