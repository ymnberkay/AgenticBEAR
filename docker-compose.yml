# AgenticBEAR — local prod-mode test rig.
#
# Runs the built image + a Postgres sidecar so you can validate the container
# behaves the same way it will inside Kubernetes. Not for dev — use `npm run dev`
# for that (hot reload + client dev server on :3000).
#
#   $ docker compose up --build
#   → UI  at http://localhost:8080
#   → API at http://localhost:8080/api/*
#
# Environment overrides (see .env.example for a full list):
#   POSTGRES_PASSWORD, POSTGRES_USER, POSTGRES_DB, JWT_SECRET

name: agenticbear

services:
  # ─── App ─────────────────────────────────────────────────────────────────
  agenticbear:
    build:
      context: .
      dockerfile: Dockerfile
    image: agenticbear:local
    restart: unless-stopped
    ports:
      - "8080:3001"          # host → container
    environment:
      NODE_ENV: production
      PORT: "3001"
      # Postgres — comment this line out to fall back to the built-in SQLite.
      DATABASE_URL: "postgres://${POSTGRES_USER:-agenticbear}:${POSTGRES_PASSWORD:-devpass}@postgres:5432/${POSTGRES_DB:-agenticbear}"
      # Auth secret — CHANGE FOR ANYTHING NON-LOCAL. 32+ random bytes.
      JWT_SECRET: "${JWT_SECRET:-please-change-me-in-real-deployments-please-change-me}"
      # SSL to Postgres inside the compose network is unnecessary.
      DATABASE_SSL: "false"
      # Increase if agents run long shells; the default (2 min) is fine for most.
      # AGENT_COMMAND_TIMEOUT_MS: "300000"
    volumes:
      # SQLite DB (if DATABASE_URL is unset) + git workspace mirrors land here.
      - agb_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s

  # ─── Postgres ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-agenticbear}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-devpass}"
      POSTGRES_DB: "${POSTGRES_DB:-agenticbear}"
    volumes:
      - agb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agenticbear} -d ${POSTGRES_DB:-agenticbear}"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  agb_data:
  agb_pgdata:
